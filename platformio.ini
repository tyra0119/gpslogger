; =============================================================
; GPS Logger for M5Stack Tab5 + GPS Unit v1.1
; =============================================================
; M5Stack Tab5 は ESP32-P4 チップを搭載。
; 公式の platformio/espressif32 は ESP32-P4 未対応のため、
; コミュニティフォーク "pioarduino" を使用する。
; 参考: https://community.m5stack.com/topic/7586/
; =============================================================
[platformio]
default_envs = m5stack-tab5
build_dir = C:/tmp/pio-gpslogger

[env:m5stack-tab5]
; pioarduino: ESP32-P4 / Arduino 3.x をサポートするフォーク
platform  = https://github.com/pioarduino/platform-espressif32.git#54.03.20
board     = esp32-p4-evboard
framework = arduino

upload_port   = COM3
monitor_port  = COM3
monitor_speed = 115200
upload_speed  = 1500000

board_build.flash_mode = qio

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    https://github.com/M5Stack/M5GFX.git
    mikalhart/TinyGPSPlus @ ^1.0.3
